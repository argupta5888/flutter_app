<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FoodRush - Delicious food, delivered fast">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FoodRush">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Theme color matches AppTheme.primary -->
  <meta name="theme-color" content="#FF5A2D">

  <title>FoodRush</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen shown while Flutter loads */
    body {
      margin: 0;
      background-color: #FF5A2D;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: white;
    }
    #loading span {
      font-size: 64px;
    }
    #loading h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    #loading p {
      margin: 0;
      opacity: 0.8;
      font-size: 15px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <span>🍔</span>
    <h1>FoodRush</h1>
    <p>Delicious food, delivered fast</p>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
